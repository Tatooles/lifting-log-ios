name: LiftingLog
options:
  bundleIdPrefix: com.kevintatooles
settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
packages:
  Clerk:
    url: https://github.com/clerk/clerk-ios
    from: 1.1.3
  ClerkConvex:
    url: https://github.com/clerk/clerk-convex-swift
    from: 0.1.0
  ConvexMobile:
    url: https://github.com/get-convex/convex-swift
    from: 0.8.1
targets:
  LiftingLog:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    attributes:
      DevelopmentTeam: RJGJJ38RV9
      ProvisioningStyle: Automatic
    sources:
      - path: LiftingLog
    dependencies:
      - package: Clerk
        product: ClerkKit
      - package: Clerk
        product: ClerkKitUI
      - package: ClerkConvex
        product: ClerkConvex
      - package: ConvexMobile
        product: ConvexMobile
    settings:
      base:
        PRODUCT_NAME: LiftingLog
        PRODUCT_BUNDLE_IDENTIFIER: com.kevintatooles.LiftingLog.dev
        CODE_SIGN_ENTITLEMENTS: LiftingLog/LiftingLog.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: RJGJJ38RV9
        APP_DISPLAY_NAME: Lifting Log Dev
        LIFTING_LOG_ENVIRONMENT: Development
        CLERK_PUBLISHABLE_KEY: pk_test_Z2xhZC1rcmlsbC0yMi5jbGVyay5hY2NvdW50cy5kZXYk
        CLERK_ASSOCIATED_DOMAIN: webcredentials:glad-krill-22.clerk.accounts.dev
        CONVEX_DEPLOYMENT_URL: https://glad-cow-603.convex.cloud
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: $(APP_DISPLAY_NAME)
        INFOPLIST_KEY_LiftingLogEnvironment: $(LIFTING_LOG_ENVIRONMENT)
        INFOPLIST_KEY_ClerkPublishableKey: $(CLERK_PUBLISHABLE_KEY)
        INFOPLIST_KEY_ClerkAssociatedDomain: $(CLERK_ASSOCIATED_DOMAIN)
        INFOPLIST_KEY_ConvexDeploymentURL: $(CONVEX_DEPLOYMENT_URL)
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: 1
      configs:
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.kevintatooles.LiftingLog
          APP_DISPLAY_NAME: Lifting Log
          LIFTING_LOG_ENVIRONMENT: Production
          CLERK_PUBLISHABLE_KEY: pk_live_Y2xlcmsuYXV0aC5saWZ0aW5nbG9nLmFwcCQ
          CLERK_ASSOCIATED_DOMAIN: webcredentials:clerk.auth.liftinglog.app
          CONVEX_DEPLOYMENT_URL: https://sensible-reindeer-16.convex.cloud
          EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
    scheme:
      testTargets:
        - LiftingLogTests
        - LiftingLogUITests
  LiftingLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LiftingLogTests
    dependencies:
      - target: LiftingLog
    settings:
      base:
        PRODUCT_NAME: LiftingLogTests
        GENERATE_INFOPLIST_FILE: YES
  LiftingLogUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LiftingLogUITests
    dependencies:
      - target: LiftingLog
    settings:
      base:
        PRODUCT_NAME: LiftingLogUITests
        GENERATE_INFOPLIST_FILE: YES
