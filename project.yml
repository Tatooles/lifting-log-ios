name: LiftingLog
options:
  bundleIdPrefix: com.kevintatooles
settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
    MARKETING_VERSION: 1.0
    # Xcode Cloud overrides CFBundleVersion for archive uploads.
    CURRENT_PROJECT_VERSION: 1
packages:
  Clerk:
    url: https://github.com/clerk/clerk-ios
    from: 1.1.3
  ClerkConvex:
    url: https://github.com/clerk/clerk-convex-swift
    from: 0.1.0
  ConvexMobile:
    url: https://github.com/get-convex/convex-swift
    from: 0.8.1
schemes:
  LiftingLogUnitTests:
    build:
      targets:
        LiftingLog: all
    test:
      config: Debug
      targets:
        - LiftingLogTests
    run:
      config: Debug
targets:
  LiftingLog:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    attributes:
      DevelopmentTeam: RJGJJ38RV9
      ProvisioningStyle: Automatic
    sources:
      - path: LiftingLog
    dependencies:
      - package: Clerk
        product: ClerkKit
      - package: Clerk
        product: ClerkKitUI
      - package: ClerkConvex
        product: ClerkConvex
      - package: ConvexMobile
        product: ConvexMobile
    postBuildScripts:
      - name: Write Build Source Metadata
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail

          metadata_path="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/BuildSourceMetadata.plist"

          if [ "${CONFIGURATION}" != "Debug" ]; then
            rm -f "${metadata_path}"
            exit 0
          fi

          mkdir -p "$(dirname "${metadata_path}")"

          branch="Unknown"
          short_commit=""
          has_local_changes="NO"

          if /usr/bin/git -C "${SRCROOT}" rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            branch="$(/usr/bin/git -C "${SRCROOT}" symbolic-ref --short HEAD 2>/dev/null || true)"
            if [ -z "${branch}" ]; then
              branch="Detached HEAD"
            fi

            short_commit="$(/usr/bin/git -C "${SRCROOT}" rev-parse --short HEAD 2>/dev/null || true)"

            if ! /usr/bin/git -C "${SRCROOT}" diff --quiet --ignore-submodules -- 2>/dev/null; then
              has_local_changes="YES"
            fi
            if ! /usr/bin/git -C "${SRCROOT}" diff --cached --quiet --ignore-submodules -- 2>/dev/null; then
              has_local_changes="YES"
            fi
            if [ -n "$(/usr/bin/git -C "${SRCROOT}" ls-files --others --exclude-standard 2>/dev/null)" ]; then
              has_local_changes="YES"
            fi
          fi

          rm -f "${metadata_path}"
          /usr/bin/plutil -create xml1 "${metadata_path}"
          /usr/bin/plutil -insert Branch -string "${branch}" "${metadata_path}"
          /usr/bin/plutil -insert ShortCommit -string "${short_commit}" "${metadata_path}"
          /usr/bin/plutil -insert HasLocalChanges -bool "${has_local_changes}" "${metadata_path}"
          /usr/bin/plutil -insert BuiltAt -string "$(/bin/date '+%Y-%m-%d %H:%M:%S %z')" "${metadata_path}"
          /usr/bin/plutil -insert Configuration -string "${CONFIGURATION}" "${metadata_path}"
    settings:
      base:
        # The Write Build Source Metadata script reads .git and writes into the
        # app bundle, neither of which user script sandboxing permits.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # dSYMs in Debug too, so Instruments can symbolicate profiling traces.
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        PRODUCT_NAME: LiftingLog
        PRODUCT_BUNDLE_IDENTIFIER: com.kevintatooles.LiftingLog.dev
        CODE_SIGN_ENTITLEMENTS: LiftingLog/LiftingLog.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: RJGJJ38RV9
        APP_DISPLAY_NAME: Lifting Log Dev
        LIFTING_LOG_ENVIRONMENT: Development
        CLERK_PUBLISHABLE_KEY: pk_test_Z2xhZC1rcmlsbC0yMi5jbGVyay5hY2NvdW50cy5kZXYk
        CLERK_ASSOCIATED_DOMAIN: webcredentials:glad-krill-22.clerk.accounts.dev
        CONVEX_DEPLOYMENT_URL: https://glad-cow-603.convex.cloud
        INFOPLIST_FILE: LiftingLog/Info.plist
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: 1
      configs:
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.kevintatooles.LiftingLog
          APP_DISPLAY_NAME: Lifting Log
          LIFTING_LOG_ENVIRONMENT: Production
          CLERK_PUBLISHABLE_KEY: pk_live_Y2xlcmsuYXV0aC5saWZ0aW5nbG9nLmFwcCQ
          CLERK_ASSOCIATED_DOMAIN: webcredentials:clerk.auth.liftinglog.app
          CONVEX_DEPLOYMENT_URL: https://sensible-reindeer-16.convex.cloud
          EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
    scheme:
      testTargets:
        - LiftingLogTests
        - LiftingLogUITests
  LiftingLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LiftingLogTests
    dependencies:
      - target: LiftingLog
    settings:
      base:
        PRODUCT_NAME: LiftingLogTests
        GENERATE_INFOPLIST_FILE: YES
  LiftingLogUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LiftingLogUITests
    dependencies:
      - target: LiftingLog
    settings:
      base:
        PRODUCT_NAME: LiftingLogUITests
        GENERATE_INFOPLIST_FILE: YES
